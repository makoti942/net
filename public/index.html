<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartWiFi - Get Connected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 50;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <nav class="bg-blue-600 p-4 text-white text-center shadow-lg">
        <h1 class="text-2xl font-bold">SmartWiFi</h1>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-md">
        <div id="setup-info" class="mb-6 bg-blue-50 p-4 rounded-lg text-sm text-blue-800 border border-blue-200">
            Connecting device: <span id="display-mac" class="font-mono">...</span>
        </div>

        <div id="package-list" class="space-y-4">
            <!-- Packages will be loaded here -->
            <div class="animate-pulse bg-white h-24 rounded-lg"></div>
            <div class="animate-pulse bg-white h-24 rounded-lg"></div>
        </div>

        <div id="payment-form" class="mt-8 bg-white p-6 rounded-xl shadow-md hidden">
            <h2 class="text-xl font-semibold mb-4">Complete Payment</h2>
            <p id="selected-package-info" class="mb-4 text-gray-600"></p>
            
            <label class="block text-sm font-medium text-gray-700 mb-1">M-Pesa Phone Number</label>
            <input type="text" id="phone" placeholder="07XXXXXXXX" class="w-full p-3 border rounded-lg mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
            
            <button id="pay-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition duration-200">
                Pay Now
            </button>
        </div>
    </main>

    <div id="overlay" class="loading-overlay">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-white mb-4"></div>
        <p class="text-xl font-medium">Processing Payment...</p>
        <p class="mt-2 text-gray-300">Check your phone for the M-Pesa prompt</p>
    </div>

    <!-- Hidden MikroTik Login Form -->
    <form id="mikrotik-form" method="POST" style="display:none;">
        <input type="hidden" name="username" id="mt-user">
        <input type="hidden" name="password" value="">
        <input type="hidden" name="dst" value="https://www.google.com">
    </form>

    <script>
        const params = new URLSearchParams(window.location.search);
        const mac = params.get('mac') || 'TEST-MAC';
        const ip = params.get('ip') || '0.0.0.0';
        const loginUrl = params.get('link-login-only') || '';
        
        document.getElementById('display-mac').innerText = mac;

        let selectedPackage = null;

        async function loadPackages() {
            const res = await fetch('/api/packages');
            const packages = await res.json();
            const container = document.getElementById('package-list');
            container.innerHTML = '';
            
            packages.forEach(pkg => {
                const div = document.createElement('div');
                div.className = 'bg-white p-4 rounded-xl shadow-sm border-2 border-transparent hover:border-blue-500 cursor-pointer transition';
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-lg">${pkg.name}</h3>
                            <p class="text-gray-500 text-sm">Unlimited High Speed</p>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-bold text-blue-600">Kes ${pkg.price}</span>
                        </div>
                    </div>
                `;
                div.onclick = () => selectPackage(pkg);
                container.appendChild(div);
            });
        }

        function selectPackage(pkg) {
            selectedPackage = pkg;
            document.getElementById('selected-package-info').innerText = `Selected: ${pkg.name} @ Kes ${pkg.price}`;
            document.getElementById('payment-form').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        document.getElementById('pay-btn').onclick = async () => {
            const phone = document.getElementById('phone').value;
            if (!phone || phone.length < 10) return alert('Please enter a valid phone number');

            document.getElementById('overlay').style.display = 'flex';

            try {
                const res = await fetch('/api/pay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone,
                        amount: selectedPackage.price,
                        mac,
                        ip,
                        loginUrl,
                        packageId: selectedPackage.id
                    })
                });
                
                const data = await res.json();
                if (data.invoice_id) {
                    startStatusStream();
                } else {
                    throw new Error('Payment initiation failed');
                }
            } catch (err) {
                alert(err.message);
                document.getElementById('overlay').style.display = 'none';
            }
        };

        function startStatusStream() {
            const eventSource = new EventSource(`/api/status-stream?mac=${mac}`);
            
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.status === 'PAID') {
                    eventSource.close();
                    connectToRouter();
                }
            };

            eventSource.onerror = () => {
                console.error("SSE Connection lost");
                // In production, you might want to retry or poll
            };
        }

        function connectToRouter() {
            if (!loginUrl) {
                alert('Payment successful! However, the router login URL is missing. Please contact support.');
                document.getElementById('overlay').style.display = 'none';
                return;
            }

            const form = document.getElementById('mikrotik-form');
            form.action = loginUrl;
            document.getElementById('mt-user').value = mac;
            form.submit();
        }

        loadPackages();
    </script>
</body>
</html>
